<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toudou Liste</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #16a34a;
      --primary-dark: #15803d;
      --danger: #dc2626;
      --danger-soft: #fff1f2;
      --shadow: 0 8px 20px rgba(17, 24, 39, 0.06);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
        sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 900px;
      margin: 28px auto;
      padding: 0 16px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    input#input {
      flex: 1 1 280px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      font-size: 14px;
      outline: none;
    }

    input#input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147, 197, 253, 0.25);
    }

    button {
      padding: 11px 14px;
      border: 1px solid transparent;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.05s ease, background 0.15s ease,
        border-color 0.15s ease, opacity 0.15s ease;
      user-select: none;
      background: var(--card);
      color: var(--text);
    }

    button:active {
      transform: translateY(1px);
    }

    #addBtn {
      background: var(--primary);
      color: white;
      border-color: var(--primary-dark);
    }

    #addBtn:hover {
      background: var(--primary-dark);
    }

    #deleteSelectedBtn {
      background: white;
      border-color: var(--border);
      color: var(--danger);
    }

    #deleteSelectedBtn:hover {
      background: var(--danger-soft);
      border-color: #fca5a5;
    }

    #deleteSelectedBtn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      border-color: var(--border);
      background: #f9fafb;
      color: var(--muted);
    }

    .status {
      min-height: 20px;
      margin: 6px 0 16px;
      color: var(--muted);
    }

    .ideas-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .idea-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .idea-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .idea-delete-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .idea-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
      font-weight: 700;
    }

    .idea-id {
      color: var(--muted);
      font-weight: 800;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Liste des actions à faire</h1>

    <div class="toolbar">
      <input id="input" placeholder="Nouvelle action" />
      <button id="addBtn">Ajouter</button>
      <button id="deleteSelectedBtn" type="button" disabled>Supprimer sélection</button>
    </div>

    <p id="status" class="status"></p>

    <ul id="list" class="ideas-list"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://ifyxcimmwklysdmatcly.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_pd7bLG8agWF0bvinOBdMdw_VTmQHrYT";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const input = document.getElementById("input");
    const addBtn = document.getElementById("addBtn");
    const deleteSelectedBtn = document.getElementById("deleteSelectedBtn");
    const list = document.getElementById("list");
    const statusEl = document.getElementById("status");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "red" : "green";
    }

    function updateSelectionUI() {
      const selectedCount = list.querySelectorAll(
        "input.idea-delete-checkbox:checked"
      ).length;

      deleteSelectedBtn.disabled = selectedCount === 0;
      deleteSelectedBtn.textContent =
        selectedCount === 0
          ? "Supprimer sélection"
          : `Supprimer sélection (${selectedCount})`;
    }

    async function loadIdeas() {
      setStatus("Chargement...");

      const { data, error } = await supabaseClient
        .from("ideas")
        .select("*")
        .order("id", { ascending: true });

      if (error) {
        console.error("Erreur lecture :", error);
        setStatus("Erreur lecture : " + error.message, true);
        return;
      }

      list.innerHTML = "";

      if (!data || data.length === 0) {
        setStatus("Aucune idée en base.");
        return;
      }

      data.forEach((idea) => {
        const li = document.createElement("li");
        li.className = "idea-item";

        // Case à cocher pour supprimer l'idée
        const deleteCheckbox = document.createElement("input");
        deleteCheckbox.type = "checkbox";
        deleteCheckbox.className = "idea-delete-checkbox";

        // Permet d'identifier l'idée à supprimer même après un reload
        deleteCheckbox.dataset.id = String(idea.id);

        const left = document.createElement("div");
        left.className = "idea-left";

        const titleText = document.createElement("span");
        titleText.className = "idea-title";
        titleText.textContent = String(idea.title);

        left.appendChild(deleteCheckbox);
        left.appendChild(titleText);

        li.appendChild(left);
        list.appendChild(li);
      });

      // On évite d'afficher un message de succès systématique.
      // (Le bouton "Supprimer sélection" et la liste restent mis à jour.)
      setStatus("", false);
      updateSelectionUI();
    }

    async function addIdea() {
      const title = input.value.trim();

      if (!title) {
        setStatus("Le champ est vide.", true);
        return;
      }

      setStatus("Insertion en cours...");

      const { data, error } = await supabaseClient
        .from("ideas")
        .insert([{ title }])
        .select();

      if (error) {
        console.error("Erreur insertion :", error);
        setStatus("Erreur insertion : " + error.message, true);
        return;
      }

      console.log("Insertion OK :", data);
      input.value = "";
      setStatus("Insertion OK.");
      await loadIdeas();
    }

    addBtn.addEventListener("click", addIdea);

    deleteSelectedBtn.addEventListener("click", async () => {
      const checkedBoxes = Array.from(
        list.querySelectorAll("input.idea-delete-checkbox:checked")
      );
      const ids = checkedBoxes
        .map((cb) => cb.dataset.id)
        .filter((id) => id !== undefined && id !== null);

      if (ids.length === 0) {
        setStatus("Aucune idée sélectionnée.", true);
        return;
      }

      const confirmed = confirm(`Supprimer ${ids.length} idée(s) ?`);
      if (!confirmed) return;

      setStatus("Suppression en lot...");

      const { error: deleteError } = await supabaseClient
        .from("ideas")
        .delete()
        .in("id", ids);

      if (deleteError) {
        console.error("Erreur suppression :", deleteError);
        setStatus("Erreur suppression : " + deleteError.message, true);
        return;
      }

      setStatus("Suppression OK.");
      await loadIdeas();
    });

    updateSelectionUI();
    loadIdeas();
  </script>
</body>
</html>
